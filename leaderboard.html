<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Leaderboard - BLT Jobs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          },
        },
      };
    </script>
    <script>
      (function () {
        const savedTheme = localStorage.getItem("theme");
        if (savedTheme === "dark") document.documentElement.classList.add("dark");
        else if (savedTheme === "light") document.documentElement.classList.remove("dark");
        else if (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) document.documentElement.classList.add("dark");
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  </head>
  <body class="min-h-screen bg-gradient-to-b from-slate-50 via-red-50/40 to-white font-sans text-slate-900 antialiased dark:from-gray-900 dark:via-gray-900 dark:to-gray-800 dark:text-gray-100">
    <nav class="border-b border-slate-200 bg-white shadow-sm dark:border-gray-700 dark:bg-gray-900/95">
      <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
        <div class="flex h-16 items-center justify-between">
          <div class="flex items-center gap-3">
            <a href="https://owaspblt.org/" target="_blank" rel="noopener noreferrer" class="flex select-none">
              <img src="https://owaspblt.org/static/img/owasp-blt-logo.svg" class="h-9 sm:h-10 w-auto" alt="OWASP BLT Logo" width="50" height="50" />
            </a>
            <div class="hidden sm:flex items-center gap-1">
              <a href="./index.html" class="rounded-lg px-3 py-2 text-sm font-medium text-slate-700 transition hover:bg-slate-100 dark:text-gray-300 dark:hover:bg-gray-800">Home</a>
              <a href="./jobs.html" class="rounded-lg px-3 py-2 text-sm font-medium text-slate-700 transition hover:bg-slate-100 dark:text-gray-300 dark:hover:bg-gray-800">Browse Jobs</a>
              <a href="./seekers.html" class="rounded-lg px-3 py-2 text-sm font-medium text-slate-700 transition hover:bg-slate-100 dark:text-gray-300 dark:hover:bg-gray-800">Find Talent</a>
              <a href="./leaderboard.html" class="rounded-lg bg-red-50 px-3 py-2 text-sm font-medium text-red-600 transition hover:bg-red-100 dark:bg-red-900/30 dark:text-red-400 dark:hover:bg-red-900/50">Leaderboard</a>
              <a href="https://github.com/OWASP-BLT/BLT-Jobs" target="_blank" rel="noreferrer noopener" class="inline-flex items-center gap-2 rounded-lg border border-slate-200 bg-white px-3.5 py-2 text-sm font-medium text-slate-700 shadow-sm transition hover:bg-slate-50 dark:border-gray-600 dark:bg-gray-800 dark:text-gray-300 dark:hover:bg-gray-700">
                <i class="fa-brands fa-github" aria-hidden="true"></i>
                GitHub
              </a>
            </div>
          </div>
          <div class="flex items-center gap-2">
            <button id="theme-toggle" class="relative inline-flex h-10 w-10 items-center justify-center rounded-lg border-2 border-red-600 text-red-600 transition hover:bg-red-600 hover:text-white dark:border-red-500 dark:text-red-500 dark:hover:bg-red-600 dark:hover:text-white" aria-label="Toggle dark mode">
              <i id="sun-icon" class="fas fa-sun text-xl absolute opacity-0 transition-all duration-300 -rotate-90 dark:opacity-100 dark:rotate-0"></i>
              <i id="moon-icon" class="fas fa-moon text-xl absolute opacity-100 transition-all duration-300 rotate-0 dark:opacity-0 dark:rotate-90"></i>
            </button>
            <button id="mobile-menu-toggle" class="sm:hidden inline-flex h-10 w-10 items-center justify-center rounded-lg border-2 border-slate-200 text-slate-700 transition hover:bg-slate-100 dark:border-gray-600 dark:text-gray-300 dark:hover:bg-gray-800" aria-label="Open menu">
              <i class="fa-solid fa-bars text-lg" aria-hidden="true"></i>
            </button>
          </div>
        </div>
        <div id="mobile-menu" class="hidden border-t border-slate-200 py-3 sm:hidden dark:border-gray-700">
          <div class="flex flex-col gap-1">
            <a href="./index.html" class="rounded-lg px-3 py-2 text-sm font-medium text-slate-700 transition hover:bg-slate-100 dark:text-gray-300 dark:hover:bg-gray-800">Home</a>
            <a href="./jobs.html" class="rounded-lg px-3 py-2 text-sm font-medium text-slate-700 transition hover:bg-slate-100 dark:text-gray-300 dark:hover:bg-gray-800">Browse Jobs</a>
            <a href="./seekers.html" class="rounded-lg px-3 py-2 text-sm font-medium text-slate-700 transition hover:bg-slate-100 dark:text-gray-300 dark:hover:bg-gray-800">Find Talent</a>
            <a href="./leaderboard.html" class="rounded-lg bg-red-50 px-3 py-2 text-sm font-medium text-red-600 transition hover:bg-red-100 dark:bg-red-900/30 dark:text-red-400 dark:hover:bg-red-900/50">Leaderboard</a>
            <a href="https://github.com/OWASP-BLT/BLT-Jobs" target="_blank" rel="noreferrer noopener" class="inline-flex items-center gap-2 rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm font-medium text-slate-700 shadow-sm transition hover:bg-slate-50 dark:border-gray-600 dark:bg-gray-800 dark:text-gray-300 dark:hover:bg-gray-700">
              <i class="fa-brands fa-github" aria-hidden="true"></i>
              GitHub
            </a>
          </div>
        </div>
      </div>
    </nav>

    <main class="mx-auto max-w-7xl px-4 py-12 sm:px-6 lg:px-8">
      <header class="mb-8">
        <h1 class="text-3xl font-bold tracking-tight sm:text-4xl dark:text-gray-100">
          <i class="fa-solid fa-trophy text-yellow-500 mr-2" aria-hidden="true"></i>
          Job Poster Leaderboard
        </h1>
        <p class="mt-2 text-slate-600 dark:text-gray-400">Community members who have contributed the most job listings</p>
      </header>

      <div id="leaderboard-container" class="space-y-4">
        <div class="flex items-center justify-center py-12">
          <div class="text-center">
            <i class="fa-solid fa-spinner fa-spin text-3xl text-red-600" aria-hidden="true"></i>
            <p class="mt-4 text-slate-600 dark:text-gray-400">Loading leaderboard...</p>
          </div>
        </div>
      </div>
    </main>

    <footer class="mt-16 border-t border-slate-200 bg-white py-8 dark:border-gray-700 dark:bg-gray-900">
      <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
        <div class="flex flex-col items-center justify-between gap-4 sm:flex-row">
          <p class="text-sm text-slate-600 dark:text-gray-400">
            © 2026 OWASP BLT Jobs. Part of the <a href="https://owasp.org/www-project-bug-logging-tool/" target="_blank" class="font-medium text-red-600 hover:text-red-700 dark:text-red-500 dark:hover:text-red-400">OWASP BLT Project</a>
          </p>
          <div class="flex gap-4">
            <a href="https://github.com/OWASP-BLT/BLT-Jobs" target="_blank" class="text-slate-600 hover:text-red-600 dark:text-gray-400 dark:hover:text-red-500">
              <i class="fa-brands fa-github text-xl" aria-hidden="true"></i>
            </a>
          </div>
        </div>
      </div>
    </footer>

    <script src="assets/js/theme.js"></script>
    <script>
      (function () {
        var MEDAL_ICONS = ['🥇', '🥈', '🥉'];

        function esc(s) {
          var d = document.createElement('div');
          d.textContent = s;
          return d.innerHTML;
        }

        function renderLeaderboard(jobs) {
          var container = document.getElementById('leaderboard-container');

          // Count jobs per user (only those with added_by set)
          var counts = {};
          jobs.forEach(function (job) {
            var user = (job.added_by || '').trim();
            if (user) {
              counts[user] = (counts[user] || 0) + 1;
            }
          });

          var ranked = Object.keys(counts)
            .map(function (user) { return { user: user, count: counts[user] }; })
            .sort(function (a, b) { return b.count - a.count || a.user.localeCompare(b.user); });

          if (ranked.length === 0) {
            container.innerHTML =
              '<div class="rounded-xl border border-slate-200 bg-white p-8 text-center shadow-sm dark:border-gray-700 dark:bg-gray-800">' +
              '<i class="fa-solid fa-trophy text-4xl text-slate-300 dark:text-gray-600" aria-hidden="true"></i>' +
              '<h3 class="mt-4 text-lg font-semibold dark:text-gray-100">No contributors yet</h3>' +
              '<p class="mt-2 text-slate-600 dark:text-gray-400">Be the first to <a href="./add.html" class="font-medium text-red-600 hover:text-red-700 dark:text-red-400">post a job</a> and earn a spot on the leaderboard!</p>' +
              '</div>';
            return;
          }

          var maxCount = ranked[0].count;

          var html = '<div class="rounded-xl border border-slate-200 bg-white shadow-sm dark:border-gray-700 dark:bg-gray-800 overflow-hidden">';
          html += '<table class="w-full text-sm">';
          html += '<thead><tr class="border-b border-slate-200 dark:border-gray-700 bg-slate-50 dark:bg-gray-700/50">';
          html += '<th class="px-6 py-3 text-left font-semibold text-slate-600 dark:text-gray-300 w-16">Rank</th>';
          html += '<th class="px-6 py-3 text-left font-semibold text-slate-600 dark:text-gray-300">Contributor</th>';
          html += '<th class="px-6 py-3 text-right font-semibold text-slate-600 dark:text-gray-300 w-32">Jobs Posted</th>';
          html += '</tr></thead>';
          html += '<tbody class="divide-y divide-slate-100 dark:divide-gray-700">';

          ranked.forEach(function (entry, i) {
            var rank = i + 1;
            var medal = MEDAL_ICONS[i] || '';
            var barWidth = Math.round((entry.count / maxCount) * 100);
            var rowClass = i < 3 ? 'bg-gradient-to-r from-yellow-50/60 to-transparent dark:from-yellow-900/10 dark:to-transparent' : '';
            html += '<tr class="transition hover:bg-slate-50 dark:hover:bg-gray-700/50 ' + rowClass + '">';
            html += '<td class="px-6 py-4 text-center font-bold text-lg text-slate-400 dark:text-gray-500">';
            if (medal) {
              html += '<span title="Rank ' + rank + '">' + medal + '</span>';
            } else {
              html += rank;
            }
            html += '</td>';
            html += '<td class="px-6 py-4">';
            html += '<div class="flex items-center gap-3">';
            html += '<img src="https://github.com/' + esc(entry.user) + '.png?size=40" alt="' + esc(entry.user) + '" width="40" height="40" class="w-10 h-10 rounded-full border border-slate-200 dark:border-gray-600" loading="lazy" onerror="this.src=\'https://github.com/ghost.png\'" />';
            html += '<div>';
            html += '<a href="https://github.com/' + esc(entry.user) + '" target="_blank" rel="noopener noreferrer" class="font-semibold text-slate-900 dark:text-gray-100 hover:text-red-600 dark:hover:text-red-400">@' + esc(entry.user) + '</a>';
            html += '<div class="mt-1 h-1.5 w-32 rounded-full bg-slate-100 dark:bg-gray-700"><div class="h-1.5 rounded-full bg-red-500" style="width:' + barWidth + '%"></div></div>';
            html += '</div></div>';
            html += '</td>';
            html += '<td class="px-6 py-4 text-right">';
            html += '<span class="inline-flex items-center gap-1 rounded-full bg-red-50 px-3 py-1 text-sm font-semibold text-red-700 dark:bg-red-900/30 dark:text-red-400">';
            html += '<i class="fa-solid fa-briefcase text-xs" aria-hidden="true"></i> ';
            html += entry.count + ' job' + (entry.count !== 1 ? 's' : '');
            html += '</span>';
            html += '</td>';
            html += '</tr>';
          });

          html += '</tbody></table></div>';
          container.innerHTML = html;
        }

        fetch('data/jobs.json', { cache: 'no-cache' })
          .then(function (r) { return r.ok ? r.json() : { jobs: [] }; })
          .then(function (data) {
            renderLeaderboard(Array.isArray(data.jobs) ? data.jobs : []);
          })
          .catch(function () {
            document.getElementById('leaderboard-container').innerHTML =
              '<div class="rounded-xl border border-red-200 bg-red-50 p-6 text-center dark:border-red-800 dark:bg-red-900/20"><p class="text-red-600 dark:text-red-400">Error loading leaderboard. Please try again later.</p></div>';
          });
      })();
    </script>
  </body>
</html>
