# When an issue labeled 'flag-job-posting' is opened or edited, create a PR to remove the flagged job.
# The PR body includes "Closes #N" so merging the PR automatically closes the issue.
name: Process job flag reports

on:
  issues:
    types: [opened, edited, labeled]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  flag-job:
    runs-on: ubuntu-latest
    if: github.event.label.name == 'flag-job-posting' || ((github.event.action == 'opened' || github.event.action == 'edited') && contains(github.event.issue.title, '[FLAG]') && contains(github.event.issue.body, '### Job ID'))
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Extract job ID from issue body
        id: parse
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          JOB_ID=$(node -e "
            const body = process.env.ISSUE_BODY || '';
            const match = body.match(/### Job ID\s*\n+([^\n]+)/);
            if (match && match[1].trim()) {
              // Sanitize: only allow alphanumeric characters, hyphens, and underscores
              const id = match[1].trim().replace(/[^a-zA-Z0-9\-_]/g, '');
              if (!id) { console.error('Empty job ID after sanitization'); process.exit(1); }
              console.log(id);
            } else {
              console.error('No Job ID found in issue body');
              process.exit(1);
            }
          ")
          echo "job_id=$JOB_ID" >> "$GITHUB_OUTPUT"
          echo "Found job ID: $JOB_ID"

      - name: Check job file exists
        id: check
        run: |
          JOB_FILE="jobs/${{ steps.parse.outputs.job_id }}.md"
          if [ -f "$JOB_FILE" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "job_file=$JOB_FILE" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment and exit if job not found
        if: steps.check.outputs.exists == 'false'
        run: |
          gh issue comment ${{ github.event.issue.number }} \
            --body "⚠️ Could not find a job with ID \`${{ steps.parse.outputs.job_id }}\`. Please verify the Job ID (found after \`?id=\` in the job page URL) and edit this issue to try again."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        if: steps.check.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Create branch, remove job file, and open PR
        if: steps.check.outputs.exists == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_BODY: "Removes the job posting flagged as inaccurate or expired.\n\nFlagged by @${{ github.event.issue.user.login }} in #${{ github.event.issue.number }}.\n\nCloses #${{ github.event.issue.number }}"
          COMMENT_BODY: "✅ A pull request has been created to remove this job posting: {PR_URL}\n\nThe issue will be automatically closed when the PR is merged."
        run: |
          BRANCH="remove-job/${{ steps.parse.outputs.job_id }}-issue-${{ github.event.issue.number }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git rm "${{ steps.check.outputs.job_file }}"

          # Rebuild data/jobs.json without the removed file
          npm ci
          npm run build:jobs
          git add data/jobs.json data/seekers.json

          git commit -m "chore: remove flagged job ${{ steps.parse.outputs.job_id }} (issue #${{ github.event.issue.number }})"
          git push origin "$BRANCH"

          PR_URL=$(gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "Remove flagged job: ${{ steps.parse.outputs.job_id }}" \
            --body "$PR_BODY")

          gh issue comment ${{ github.event.issue.number }} \
            --body "${COMMENT_BODY//\{PR_URL\}/$PR_URL}"
