name: Job Posting from Link
description: Post a job by pasting a job URL — we scrape it and add the listing automatically
title: 'Job Post from Link'
labels: ['job-posting-from-link']
body:
  - type: input
    id: job_url
    attributes:
      label: Job Posting URL
      description: Paste the full URL of the job posting here then click **Submit new issue**. Our bot will scrape it and add the listing automatically
      placeholder: "https://example.com/jobs/123"
    validations:
      required: true
